<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .content {
            display: flex;
            align-content: space-between;
            justify-content: space-between;
            background-color: black;
        }

        .content .head {
            margin: 1rem;
            padding: 2rem;
        }

        #list {
            list-style: none;
            display: flex;
            gap: 40px;
            color: white;

        }

        .nav {
            margin: 1rem 2rem;
            padding: 2px;
            background-color: white;
            border-radius: 20px;


        }
    </style>
</head>

<body>
    <div class="content">
        <div class="head" style="justify-content: space-between; align-content: space-between;">
            <ul id="list">
                <li>Details</li>
                <li>Product</li>
                <li>Pricing</li>
                <li>People</li>
                <li>Settings</li>
                <li>Analytics</li>


            </ul>

        </div>
        <div class="nav">
            <h5>Logo</h5>


        </div>
    </div>
</body>

</html>
