<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="DOM.CSS" rel="stylesheet" </head>

<body>
    <div id="Main">
        <section class="heading">
            <div CLASS="menu">
                <h4 style="color:white" ;>FOOD MENU</h4>
            </div>
        </section>

        <section class="List">
            <div class="dishes">
                <ul class="menulist">
                    <h3>Dishes</h3>
                    <li>Noodles</li>
                    <li>Beans</li>
                    <li>Egg</li>
                </ul>
            </div>
            <div class="price">
                <ul class="pricelist">
                    <h3>Price</h3>
                    <li>$10</li>
                    <li>$5</li>
                    <li>$7</li>
                </ul>
            </div>
        </section>
        <section class="add">
            <form class="menuform">
                <input class="menufield" type="text" placeholder="Add to menu" />
                <input class="pricefield" type="text" placeholder="Add price" />
            </form>
        </section>
        <section class="btn">
            <button class="click">click me</button>

        </section>
    </div>
    <script src="dom.js"></script>
</body>

</html>
